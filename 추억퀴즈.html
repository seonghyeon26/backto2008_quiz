<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>추억 퀴즈 게임</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@300;400;700&display=swap" rel="stylesheet">
  <style>
    /* ===== CSS Custom Properties (파스텔 테마 변수) ===== */
    :root {
      --color-bg: #FFF8F0;
      --color-primary: #FF8FAB;
      --color-secondary: #A8D8EA;
      --color-accent: #FFD93D;
      --color-success: #6BCB77;
      --color-error: #FF6B6B;
      --color-text: #2D3436;
      --color-text-light: #636E72;
      --color-card-bg: #FFFFFF;
      --color-overlay: rgba(0, 0, 0, 0.6);
      --radius: 16px;
      --radius-sm: 10px;
      --shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
      --max-width: 430px;
      --min-touch: 48px;
      --transition: 300ms ease;
    }

    /* ===== 전역 리셋 ===== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    /* ===== 기본 바디 스타일 ===== */
    body {
      font-family: 'Gaegu', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans KR', sans-serif;
      background: #1a1a2e;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      color: var(--color-text);
      font-size: 16px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* ===== 메인 컨테이너 ===== */
    .container {
      width: 100%;
      max-width: var(--max-width);
      min-height: 100vh;
      padding: 20px 16px;
      position: relative;
      overflow: hidden;
      background: linear-gradient(180deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    }

    /* 시작/카테고리 화면 레트로 배경 패턴 */
    .retro-bg {
      background: 
        radial-gradient(circle at 20% 80%, rgba(255, 107, 157, 0.15) 0%, transparent 50%),
        radial-gradient(circle at 80% 20%, rgba(168, 216, 234, 0.15) 0%, transparent 50%),
        radial-gradient(circle at 50% 50%, rgba(255, 217, 61, 0.08) 0%, transparent 60%),
        repeating-linear-gradient(0deg, transparent, transparent 40px, rgba(255,255,255,0.02) 40px, rgba(255,255,255,0.02) 41px);
    }

    /* ===== 화면(Screen) 기본 스타일 ===== */
    .screen {
      display: none;
      opacity: 0;
      transform: translateY(10px);
      transition: opacity var(--transition), transform var(--transition);
      width: 100%;
    }

    .screen.active {
      display: flex;
      flex-direction: column;
      align-items: center;
      opacity: 1;
      transform: translateY(0);
    }

    /* ===== 시작 화면 ===== */
    .start-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 80vh;
      text-align: center;
      padding: 20px;
    }

    .game-title {
      font-size: 33px;
      font-weight: 700;
      color: #ffffff;
      line-height: 1.6;
      margin-bottom: 12px;
      text-shadow: 0 0 20px rgba(255, 143, 171, 0.5);
    }

    .game-subtitle {
      font-size: 25px;
      color: var(--color-accent);
      font-weight: 600;
      margin-bottom: 40px;
      text-shadow: 0 0 10px rgba(255, 217, 61, 0.3);
    }

    .btn-start {
      background: linear-gradient(135deg, var(--color-primary), #FF6B9D);
      color: white;
      border: none;
      padding: 16px 48px;
      border-radius: 30px;
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
      min-height: var(--min-touch);
      box-shadow: 0 4px 15px rgba(255, 143, 171, 0.4);
      transition: transform 200ms ease, box-shadow 200ms ease;
    }

    .btn-start:active {
      transform: scale(0.95);
      box-shadow: 0 2px 8px rgba(255, 143, 171, 0.3);
    }

    /* ===== 카테고리 선택 화면 ===== */
    .category-title {
      font-size: 29px;
      font-weight: 700;
      text-align: center;
      margin-top: 20px;
      margin-bottom: 8px;
      color: #ffffff;
      text-shadow: 0 0 10px rgba(255,255,255,0.2);
    }

    .category-subtitle {
      font-size: 21px;
      color: rgba(255,255,255,0.7);
      text-align: center;
      margin-bottom: 24px;
    }

    .category-grid {
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: 100%;
      padding: 0 4px;
    }

    .category-card {
      background: rgba(255, 255, 255, 0.08);
      border: 1.5px solid rgba(255, 255, 255, 0.15);
      border-radius: var(--radius);
      padding: 22px 20px;
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 14px;
      cursor: pointer;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      transition: transform 200ms ease, border-color 200ms ease, background 200ms ease;
      min-height: 72px;
    }

    .category-card:hover {
      background: rgba(255, 255, 255, 0.12);
      border-color: var(--color-primary);
    }

    .category-card:active {
      transform: scale(0.97);
      border-color: var(--color-primary);
      background: rgba(255, 143, 171, 0.15);
    }

    .category-card .icon {
      font-size: 36px;
      flex-shrink: 0;
    }

    .category-card .card-text {
      display: flex;
      flex-direction: column;
      gap: 3px;
      text-align: left;
    }

    .category-card .name {
      font-size: 22px;
      font-weight: 700;
      color: #ffffff;
    }

    .category-card .era-desc {
      font-size: 18px;
      color: rgba(255, 255, 255, 0.6);
    }

    /* ===== 퀴즈 화면 ===== */
    #screen-quiz, #screen-success, #screen-fail {
      background: rgba(255, 255, 255, 0.95);
      border-radius: var(--radius);
      padding: 20px 16px;
      margin-top: 10px;
      min-height: 90vh;
    }
    .quiz-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
      margin-bottom: 16px;
    }

    .btn-retry {
      background: none;
      border: 1.5px solid var(--color-text-light);
      color: var(--color-text-light);
      padding: 8px 14px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      min-height: var(--min-touch);
      display: flex;
      align-items: center;
      transition: background 200ms ease;
    }

    .btn-retry:active {
      background: rgba(0,0,0,0.05);
    }

    .progress {
      background: var(--color-primary);
      color: white;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 700;
    }

    .quiz-image-wrap {
      width: 100%;
      max-width: 320px;
      height: 200px;
      border-radius: var(--radius);
      overflow: hidden;
      margin-bottom: 16px;
      background: #f0f0f0;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    .quiz-image {
      width: 100%;
      height: 100%;
      object-fit: contain;
      border-radius: var(--radius);
    }

    .question-text {
      font-size: 23px;
      font-weight: 600;
      text-align: center;
      margin-bottom: 16px;
      padding: 0 8px;
      line-height: 1.6;
      word-break: keep-all;
    }

    /* ===== 타이머 ===== */
    .timer-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
      max-width: 320px;
      margin-bottom: 20px;
    }

    .timer-bar-bg {
      flex: 1;
      height: 10px;
      background: #eee;
      border-radius: 5px;
      overflow: hidden;
    }

    .timer-bar {
      height: 100%;
      width: 100%;
      background: var(--color-primary);
      border-radius: 5px;
      transition: width 50ms linear, background-color 200ms ease;
    }

    .timer-bar.warning {
      background: var(--color-accent);
    }

    .timer-bar.danger {
      background: var(--color-error);
      animation: blink 500ms infinite;
    }

    .timer-text {
      font-size: 14px;
      font-weight: 700;
      min-width: 32px;
      text-align: right;
      color: var(--color-text);
    }

    .timer-text.danger {
      color: var(--color-error);
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* ===== 선택지 버튼 ===== */
    .options {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .option-btn {
      width: 100%;
      padding: 16px 18px;
      border: 2px solid #e0e0e0;
      border-radius: var(--radius-sm);
      background: var(--color-card-bg);
      font-size: 21px;
      font-weight: 500;
      cursor: pointer;
      min-height: var(--min-touch);
      text-align: left;
      transition: border-color 200ms ease, background-color 200ms ease, transform 200ms ease;
    }

    .option-btn:active {
      transform: scale(0.98);
    }

    .option-btn.correct {
      background: rgba(107, 203, 119, 0.2);
      border-color: var(--color-success);
      color: #1a7a2e;
      font-weight: 700;
    }

    .option-btn.wrong {
      background: rgba(255, 107, 107, 0.2);
      border-color: var(--color-error);
      color: #c0392b;
      font-weight: 700;
      animation: shake 500ms ease;
    }

    .option-btn:disabled {
      cursor: not-allowed;
      opacity: 0.7;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-6px); }
      40% { transform: translateX(6px); }
      60% { transform: translateX(-4px); }
      80% { transform: translateX(4px); }
    }

    /* ===== 콤보 팝업 ===== */
    .combo-popup {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0);
      font-size: 28px;
      font-weight: 800;
      color: var(--color-primary);
      text-shadow: 0 2px 8px rgba(255,143,171,0.3);
      animation: combo-pop 800ms ease forwards;
      z-index: 999;
      pointer-events: none;
    }

    @keyframes combo-pop {
      0% { transform: translate(-50%, -50%) scale(0); opacity: 0; }
      30% { transform: translate(-50%, -50%) scale(1.3); opacity: 1; }
      70% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
      100% { transform: translate(-50%, -60%) scale(0.8); opacity: 0; }
    }

    /* ===== 정답 설명 ===== */
    .explanation-box {
      width: 100%;
      margin-top: 12px;
      padding: 12px 16px;
      background: rgba(107, 203, 119, 0.1);
      border-radius: var(--radius-sm);
      border-left: 4px solid var(--color-success);
      font-size: 13px;
      color: var(--color-text);
      line-height: 1.5;
      animation: fadeIn 300ms ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(5px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ===== 결과 화면 (성공/실패) ===== */
    .result-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 75vh;
      text-align: center;
      padding: 20px;
      position: relative;
    }

    .result-emoji {
      font-size: 64px;
      margin-bottom: 16px;
    }

    .success-title, .result-title {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .success-message, .result-message {
      font-size: 18px;
      color: var(--color-text-light);
      margin-bottom: 8px;
      white-space: pre-line;
      line-height: 1.7;
    }

    .result-brand {
      font-size: 20px;
      font-weight: 700;
      color: var(--color-primary);
      margin: 8px 0;
    }

    .result-desc {
      font-size: 14px;
      color: var(--color-text-light);
      margin-bottom: 24px;
      line-height: 1.5;
      padding: 0 16px;
    }

    .btn-action {
      border: none;
      padding: 16px 40px;
      border-radius: 30px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      min-height: var(--min-touch);
      margin-top: 20px;
      transition: transform 200ms ease;
    }

    .btn-action:active {
      transform: scale(0.95);
    }

    .btn-success {
      background: linear-gradient(135deg, var(--color-success), #4CAF50);
      color: white;
      box-shadow: 0 4px 12px rgba(107, 203, 119, 0.4);
    }

    .btn-fail {
      background: linear-gradient(135deg, var(--color-primary), #FF6B9D);
      color: white;
      box-shadow: 0 4px 12px rgba(255, 143, 171, 0.4);
    }

    /* ===== Confetti 애니메이션 ===== */
    .confetti-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 998;
      overflow: hidden;
    }

    .confetti-piece {
      position: absolute;
      top: -20px;
      width: 10px;
      height: 10px;
      border-radius: 2px;
      animation: confetti-fall linear forwards;
    }

    @keyframes confetti-fall {
      0% { transform: translateY(0) rotate(0deg); opacity: 1; }
      100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
    }

    /* ===== 확인 다이얼로그 ===== */
    .confirm-dialog {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }

    .confirm-dialog.active {
      display: flex;
    }

    .modal-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: var(--color-overlay);
    }

    .confirm-box {
      position: relative;
      background: white;
      border-radius: var(--radius);
      padding: 28px 24px;
      text-align: center;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
      max-width: 300px;
      width: 85%;
      z-index: 1;
    }

    .confirm-box p {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 20px;
      line-height: 1.5;
    }

    .confirm-buttons {
      display: flex;
      gap: 10px;
      justify-content: center;
    }

    .btn-confirm-yes, .btn-confirm-no {
      padding: 12px 24px;
      border-radius: 25px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      min-height: var(--min-touch);
      border: none;
      transition: transform 200ms ease;
    }

    .btn-confirm-yes:active, .btn-confirm-no:active {
      transform: scale(0.95);
    }

    .btn-confirm-yes {
      background: var(--color-primary);
      color: white;
    }

    .btn-confirm-no {
      background: #eee;
      color: var(--color-text);
    }

    /* ===== 이미지 줌 모달 ===== */
    .image-modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1100;
      align-items: center;
      justify-content: center;
      background: var(--color-overlay);
    }

    .image-modal.active {
      display: flex;
    }

    .image-modal img {
      max-width: 90%;
      max-height: 80%;
      border-radius: var(--radius);
      object-fit: contain;
    }

    .image-modal-close {
      position: absolute;
      top: 20px;
      right: 20px;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: white;
      border: none;
      font-size: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ===== 위험 경고 배너 ===== */
    .danger-banner {
      position: fixed;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--color-error);
      color: white;
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 700;
      z-index: 900;
      animation: fadeIn 300ms ease;
    }

    /* ===== 반응형 ===== */
    @media (max-width: 360px) {
      .container {
        padding: 16px 12px;
      }
      .game-title {
        font-size: 20px;
      }
      .category-card {
        padding: 16px 8px;
        min-height: 110px;
      }
      .category-card .name {
        font-size: 12px;
      }
    }
  </style>
</head>
<body>
  <div class="container">

    <!-- 시작 화면 -->
    <section id="screen-start" class="screen active retro-bg">
      <div class="start-content">
        <h1 class="game-title">낭만과 감성이 가득한<br>그때 그시절 ... ★</h1>
        <p class="game-subtitle">추억 퀴즈 챌린지</p>
        <button class="btn-start" id="btn-start">시작하기</button>
      </div>
    </section>

    <!-- 카테고리 선택 화면 -->
    <section id="screen-category" class="screen retro-bg">
      <h2 class="category-title">어떤 시대에 도전할까요?</h2>
      <p class="category-subtitle">카테고리를 선택하세요</p>
      <div class="category-grid">
        <button class="category-card" data-category="1988">
          <span class="icon">📼</span>
          <div class="card-text">
            <span class="name">응답하라 1988</span>
            <span class="era-desc">80~90년대 추억</span>
          </div>
        </button>
        <button class="category-card" data-category="1998">
          <span class="icon">💿</span>
          <div class="card-text">
            <span class="name">응답하라 1998</span>
            <span class="era-desc">90~00년대 추억</span>
          </div>
        </button>
        <button class="category-card" data-category="2008">
          <span class="icon">📱</span>
          <div class="card-text">
            <span class="name">응답하라 2008</span>
            <span class="era-desc">00~10년대 추억</span>
          </div>
        </button>
        <button class="category-card" data-category="mz">
          <span class="icon">🔥</span>
          <div class="card-text">
            <span class="name">MZ편: 자신있는 사람만</span>
            <span class="era-desc">요즘 트렌드</span>
          </div>
        </button>
      </div>
    </section>

    <!-- 퀴즈 문제 화면 -->
    <section id="screen-quiz" class="screen">
      <div class="quiz-header">
        <button class="btn-retry" id="btn-retry">↩ 다시 도전하기</button>
        <span class="progress" id="progress">1/3</span>
      </div>
      <div class="quiz-image-wrap" id="quiz-image-wrap">
        <img id="quiz-image" class="quiz-image" alt="퀴즈 이미지" />
      </div>
      <p class="question-text" id="question-text">질문 텍스트</p>
      <div class="timer-wrap">
        <div class="timer-bar-bg"><div class="timer-bar" id="timer-bar"></div></div>
        <span class="timer-text" id="timer-text">3.0</span>
      </div>
      <div class="options" id="options">
        <button class="option-btn" data-index="0"></button>
        <button class="option-btn" data-index="1"></button>
        <button class="option-btn" data-index="2"></button>
        <button class="option-btn" data-index="3"></button>
      </div>
    </section>

    <!-- 성공(축하) 화면 -->
    <section id="screen-success" class="screen">
      <div class="result-screen">
        <div class="confetti-container" id="confetti-container"></div>
        <div class="result-emoji" id="success-emoji">🎉</div>
        <h2 class="success-title" id="success-title">축하합니다!</h2>
        <p class="success-message" id="success-message">3문제 모두 정답! 추억 마스터!</p>
        <button class="btn-action btn-success" id="btn-success-retry">다시 도전하기</button>
      </div>
    </section>

    <!-- 실패 화면 -->
    <section id="screen-fail" class="screen">
      <div class="result-screen">
        <div class="result-emoji">😢</div>
        <h2 class="result-title">아쉬워요!</h2>
        <p class="result-message" id="fail-message">정답은...</p>
        <p class="result-brand" id="fail-answer"></p>
        <p class="result-desc" id="fail-desc"></p>
        <button class="btn-action btn-fail" id="btn-fail-retry">다시 시도</button>
      </div>
    </section>

    <!-- 재시작 확인 다이얼로그 -->
    <div id="confirm-dialog" class="confirm-dialog">
      <div class="modal-overlay" id="confirm-overlay"></div>
      <div class="confirm-box">
        <p>처음부터 다시 시작할까요?</p>
        <div class="confirm-buttons">
          <button class="btn-confirm-yes" id="confirm-yes">확인</button>
          <button class="btn-confirm-no" id="confirm-no">취소</button>
        </div>
      </div>
    </div>

    <!-- 이미지 줌 모달 -->
    <div id="image-modal" class="image-modal">
      <button class="image-modal-close" id="image-modal-close">✕</button>
      <img id="image-modal-img" src="" alt="확대 이미지" />
    </div>

    /* ===== 핵심 로직 함수 ===== */

    // Fisher-Yates 셔플 (원본 보존)
    function shuffle(arr) {
      const shuffled = [...arr];
      for (let i = shuffled.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
      }
      return shuffled;
    }

    // 카테고리에서 3문제 무작위 선택
    function selectQuestions(category, data) {
      const pool = data[category].questions;
      const shuffled = shuffle(pool);
      return shuffled.slice(0, 3);
    }

    // 타이머 상태 분류
    function getTimerState(remaining) {
      if (remaining <= 1000) return 'danger';
      if (remaining <= 1800) return 'warning';
      return 'normal';
    }

    // 초기 게임 상태 생성
    function createInitialState() {

        isAnswered: false,
        timer: null,
        timerStart: 0,
        timerDuration: 3000
      };

    function resetGame(state) {
      const initial = createInitialState();
      state.currentCategory = initial.currentCategory;
      state.currentQuestion = initial.currentQuestion;
      state.score = initial.score;
      state.questions = initial.questions;
      state.isAnswered = initial.isAnswered;
      state.timer = initial.timer;
      state.timerStart = initial.timerStart;
      state.timerDuration = initial.timerDuration;
      return state;
    }

    /* ===== 화면 전환 매니저 ===== */
    function showScreen(name) {
      const screens = document.querySelectorAll('.screen');
      screens.forEach(screen => {
        screen.classList.remove('active');
      });
      // 약간의 딜레이로 애니메이션 효과
      setTimeout(() => {
        const target = document.getElementById('screen-' + name);
        if (target) {
          target.classList.add('active');
        }
      }, 50);
    }

    /* ===== 타이머 관리 ===== */
    function startTimer() {
      stopTimer(); // 기존 타이머 정리
      gameState.timerStart = Date.now();
      timerBar.style.width = '100%';
      timerBar.className = 'timer-bar';
      timerText.className = 'timer-text';
      timerText.textContent = '3.0';

      // 위험 배너 제거
      removeDangerBanner();

      gameState.timer = setInterval(() => {
        const elapsed = Date.now() - gameState.timerStart;
        const remaining = Math.max(0, gameState.timerDuration - elapsed);
        const percent = (remaining / gameState.timerDuration) * 100;
        const seconds = (remaining / 1000).toFixed(1);

        timerBar.style.width = percent + '%';
        timerText.textContent = seconds;

        // 타이머 상태에 따른 색상 변경
        const state = getTimerState(remaining);
        timerBar.className = 'timer-bar';
        timerText.className = 'timer-text';
        if (state === 'warning') {
          timerBar.classList.add('warning');
        } else if (state === 'danger') {
          timerBar.classList.add('danger');
          timerText.classList.add('danger');
          showDangerBanner();
        }

        // 시간 초과
        if (remaining <= 0) {
          stopTimer();
          timerBar.style.width = '0%';
          timerText.textContent = '0.0';
          handleTimeOut();
        }
      }, 50);
    }

    function stopTimer() {
      if (gameState.timer) {
        clearInterval(gameState.timer);
        gameState.timer = null;
      }

      // 선택지 셔플 후 표시
      const shuffledOptions = shuffle(q.options);
      const buttons = optionsEl.querySelectorAll('.option-btn');
      buttons.forEach((btn, i) => {
        btn.textContent = shuffledOptions[i];
        btn.className = 'option-btn';
        btn.disabled = false;
        btn.dataset.value = shuffledOptions[i];
      });

      // 기존 설명 박스 제거
      const existingExplanation = optionsEl.querySelector('.explanation-box');
      if (existingExplanation) existingExplanation.remove();

      // 답변 상태 초기화
      gameState.isAnswered = false;

      // 타이머 시작
      startTimer();
    }

    /* ===== 이미지 에러 처리 ===== */
    quizImage.onerror = function() {
      // SVG placeholder로 대체
      this.style.display = 'none';
      const wrap = this.parentElement;
      // 기존 placeholder 제거
      const existing = wrap.querySelector('.img-placeholder');
      if (existing) existing.remove();

      const placeholder = document.createElement('div');
      placeholder.className = 'img-placeholder';
      placeholder.style.cssText = 'display:flex;flex-direction:column;align-items:center;justify-content:center;width:100%;height:100%;background:#f8f8f8;border-radius:16px;';
      placeholder.innerHTML = '<span style="font-size:48px;">📷</span><span style="font-size:13px;color:#999;margin-top:8px;">이미지 준비중</span>';
      wrap.appendChild(placeholder);
    };

    quizImage.onload = function() {
      this.style.display = 'block';
      const placeholder = this.parentElement.querySelector('.img-placeholder');
      if (placeholder) placeholder.remove();
    };

    /* ===== 정답/오답 처리 ===== */
    function handleAnswer(selectedBtn) {
      if (gameState.isAnswered) return;
      gameState.isAnswered = true;
      stopTimer();

      const q = gameState.questions[gameState.currentQuestion];
      const selectedValue = selectedBtn.dataset.value;
      const isCorrect = selectedValue === q.answer;

      // 모든 버튼 비활성화
      const buttons = optionsEl.querySelectorAll('.option-btn');
      buttons.forEach(btn => {
        btn.disabled = true;
        if (btn.dataset.value === q.answer) {
          btn.classList.add('correct');
        }
      });

      if (isCorrect) {
        // 정답 처리
        gameState.score++;
        comboCount++;
        selectedBtn.classList.add('correct');

        // 콤보 팝업
        showComboPopup(comboCount);

        // 정답 설명 표시
        const explanationBox = document.createElement('div');
        explanationBox.className = 'explanation-box';
        explanationBox.textContent = '💡 ' + q.explanation;
        optionsEl.appendChild(explanationBox);

        // 다음 문제 또는 성공
        setTimeout(() => {
          if (gameState.currentQuestion >= 2) {
            // 3문제 모두 정답 → 성공 화면
            const catData = quizData[gameState.currentCategory];
            document.getElementById('success-emoji').textContent = catData.successEmoji || '🎉';
            document.getElementById('success-title').textContent = catData.successTitle || '축하합니다!';
            document.getElementById('success-message').textContent = catData.successMessage || '3문제 모두 정답!';
            showScreen('success');
            createConfetti();
          } else {
            // 다음 문제
            gameState.currentQuestion++;
            renderQuestion();
          }
        }, 1500);
      } else {
        // 오답 처리
        selectedBtn.classList.add('wrong');
        comboCount = 0;

        setTimeout(() => {
          showFailScreen(q.answer, q.explanation, '오답');
        }, 800);
      }
    }

    /* ===== 시간 초과 처리 ===== */
    function handleTimeOut() {
      if (gameState.isAnswered) return;
      gameState.isAnswered = true;
      comboCount = 0;

      const q = gameState.questions[gameState.currentQuestion];

      // 모든 버튼 비활성화 + 정답 표시
      const buttons = optionsEl.querySelectorAll('.option-btn');
      buttons.forEach(btn => {
        btn.disabled = true;
        if (btn.dataset.value === q.answer) {
          btn.classList.add('correct');
        }
      });

      setTimeout(() => {
        showFailScreen(q.answer, q.explanation, '시간초과');
      }, 800);
    }

    /* ===== 실패 화면 표시 ===== */
    function showFailScreen(answer, explanation, reason) {
      if (reason === '시간초과') {
        failMessage.textContent = '⏰ 시간이 초과되었어요!';
      } else {
        failMessage.textContent = '정답은...';
      }
      failAnswer.textContent = answer;
      failDesc.textContent = explanation;
      showScreen('fail');
    }

    /* ===== 콤보 팝업 ===== */
    function showComboPopup(count) {
      const messages = {
        1: '🔥 Good!',
        2: '🔥🔥 Great!!',
        3: '🔥🔥🔥 Perfect!!!'
      };
      const msg = messages[count] || messages[3];
      const popup = document.createElement('div');
      popup.className = 'combo-popup';
      popup.textContent = msg;
      document.body.appendChild(popup);
      setTimeout(() => popup.remove(), 900);
    }

    /* ===== Confetti 효과 ===== */
    function createConfetti() {
      const container = document.getElementById('confetti-container');
      container.innerHTML = '';
      const colors = ['#FF8FAB', '#A8D8EA', '#FFD93D', '#6BCB77', '#FF6B6B', '#DDA0DD', '#87CEEB'];

      for (let i = 0; i < 30; i++) {
        const piece = document.createElement('div');
        piece.className = 'confetti-piece';
        piece.style.left = Math.random() * 100 + '%';
        piece.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
        piece.style.animationDuration = (2 + Math.random() * 2) + 's';
        piece.style.animationDelay = Math.random() * 0.5 + 's';
        piece.style.width = (6 + Math.random() * 8) + 'px';
        piece.style.height = (6 + Math.random() * 8) + 'px';
        piece.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
        container.appendChild(piece);
      }

      // 4초 후 제거
      setTimeout(() => {
        container.innerHTML = '';
      }, 4000);
    }

    /* ===== 이벤트 핸들러 등록 ===== */

    // 시작하기 버튼
    btnStart.addEventListener('click', () => {
      showScreen('category');
    });

    // 카테고리 선택
    document.querySelectorAll('.category-card').forEach(card => {
      card.addEventListener('click', () => {
        const category = card.dataset.category;
        gameState.currentCategory = category;
        gameState.currentQuestion = 0;
        gameState.score = 0;
        comboCount = 0;
        gameState.questions = selectQuestions(category, quizData);
        showScreen('quiz');
        const catData = quizData[category];
        if (catData.bgColor) {
          document.querySelector('.container').style.background = catData.bgColor;
        }
        setTimeout(() => renderQuestion(), 100);
      });
    });

    // 선택지 클릭
    optionsEl.addEventListener('click', (e) => {
      const btn = e.target.closest('.option-btn');
      if (btn && !btn.disabled) {
        handleAnswer(btn);
      }
    });

    // 퀴즈 헤더 "다시 도전하기" → 확인 다이얼로그
    btnRetry.addEventListener('click', () => {
      stopTimer();
      confirmDialog.classList.add('active');
    });

    // 확인 다이얼로그 - 확인
    confirmYes.addEventListener('click', () => {
      confirmDialog.classList.remove('active');
      resetGame(gameState);
      comboCount = 0;
      document.querySelector('.container').style.background = '';
      showScreen('category');
    });

    // 확인 다이얼로그 - 취소
    confirmNo.addEventListener('click', () => {
      confirmDialog.classList.remove('active');
      // 타이머가 멈춰있었다면 다시 시작
      if (!gameState.isAnswered && !gameState.timer) {
        startTimer();
      }
    });

    // 오버레이 클릭도 취소로 처리
    confirmOverlay.addEventListener('click', () => {
      confirmDialog.classList.remove('active');
      if (!gameState.isAnswered && !gameState.timer) {
        startTimer();
      }
    });

    // 성공 화면 "다시 도전하기"
    btnSuccessRetry.addEventListener('click', () => {
      resetGame(gameState);
      comboCount = 0;
      document.querySelector('.container').style.background = '';
      showScreen('category');
    });

    // 실패 화면 "다시 시도"
    btnFailRetry.addEventListener('click', () => {
      resetGame(gameState);
      comboCount = 0;
      document.querySelector('.container').style.background = '';
      showScreen('category');
    });

    // 이미지 줌 모달
    quizImageWrap.addEventListener('click', () => {
      const src = quizImage.src;
      if (src && quizImage.style.display !== 'none') {
        imageModalImg.src = src;
        imageModal.classList.add('active');
      }
    });

    imageModalClose.addEventListener('click', () => {
      imageModal.classList.remove('active');
    });

    imageModal.addEventListener('click', (e) => {
      if (e.target === imageModal) {
        imageModal.classList.remove('active');
      }
    });
  </script>
</body>
</html>
